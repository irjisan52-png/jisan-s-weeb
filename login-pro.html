<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>3D Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("breck gorung.jpg") no-repeat center center/cover;
      perspective: 1000px;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
    }

    .welcome {
      position: absolute;
      top: 30px;
      font-size: 38px;
      color: white;
      z-index: 2;
      text-shadow: 0 5px 15px black;
    }

    .card {
      width: 380px;
      padding: 40px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
      color: white;
      z-index: 2;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .switch {
      margin-top: 15px;
      text-align: center;
    }

    .switch a {
      color: #00ffff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1 class="welcome">Welcome Back</h1>

  <div class="card">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="switch">
      Don't have account? <a href="signup-pro.html">Sign Up</a>
    </div>
  </div>

  <script>
    function login() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      let user = JSON.parse(localStorage.getItem("userProfile"));

      if (user && user.email === email && user.password === password) {
        window.location.href = "profile.html";
      } else {
        alert("Invalid Email or Password");
      }
    }
  </script>

</body>

</html>
